<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40">
  <!-- Keyboard outline -->
  <rect x="2" y="6" width="20" height="13" rx="2" fill="currentColor"/>
  <!-- Keys row 1 -->
  <g fill="white" opacity="0.4">
    <rect x="4" y="8" width="2.5" height="2" rx="0.4"/>
    <rect x="7.5" y="8" width="2.5" height="2" rx="0.4"/>
    <rect x="11" y="8" width="2.5" height="2" rx="0.4"/>
    <rect x="14.5" y="8" width="2.5" height="2" rx="0.4"/>
    <rect x="18" y="8" width="2" height="2" rx="0.4"/>
  </g>
  <!-- Keys row 2 -->
  <g fill="white" opacity="0.4">
    <rect x="5" y="11" width="2.5" height="2" rx="0.4"/>
    <rect x="8.5" y="11" width="2.5" height="2" rx="0.4"/>
    <rect x="12" y="11" width="2.5" height="2" rx="0.4"/>
    <rect x="15.5" y="11" width="2.5" height="2" rx="0.4"/>
  </g>
  <!-- Space bar -->
  <rect x="7" y="14.5" width="10" height="2" rx="0.4" fill="white" opacity="0.4"/>
</svg>
